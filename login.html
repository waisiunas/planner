<!doctype html>

<html
  lang="en"
  class="layout-wide customizer-hide"
  dir="ltr"
  data-skin="default"
  data-assets-path="../../template/"
  data-template="vertical-menu-template"
  data-bs-theme="light"
>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />

    <title>Login</title>

    <!-- Supabase config: anon/public API key (publishable) -->
    <meta name="supabase-key" content="sb_publishable_E6ypS6wMqOvSeiFbGZCJUQ_KDXIUp2K">

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/img/favicon/favicon.ico"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/vendor/fonts/iconify-icons.css" />

    <!-- Core CSS -->
    <!-- build:css assets/vendor/css/theme.css  -->

    <link rel="stylesheet" href="./assets/vendor/libs/pickr/pickr-themes.css" />

    <link rel="stylesheet" href="./assets/vendor/css/core.css" />
    <link rel="stylesheet" href="./assets/css/demo.css" />

    <!-- Vendors CSS -->

    <link
      rel="stylesheet"
      href="./assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css"
    />

    <!-- endbuild -->

    <!-- Vendor -->
    <link
      rel="stylesheet"
      href="./assets/vendor/libs/@form-validation/form-validation.css"
    />

    <!-- Page CSS -->

    <link rel="stylesheet" href="./assets/vendor/css/pages/page-auth.css" />

    <!-- Helpers -->
    <script src="./assets/vendor/js/helpers.js"></script>
    <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->

    <!--? Template customizer: To hide customizer set displayCustomizer value false in config.js.  -->
    <script src="./assets/vendor/js/template-customizer.js"></script>

    <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->

    <script src="./assets/js/config.js"></script>
    <!-- Supabase client (UMD) -->
    <script>
      // Supabase config; actual client will be created later when needed.
      window.__SUPABASE_CONFIG = {
        url: "https://pfqqsyboqnscqhblhnwx.supabase.co",
        key: document.querySelector('meta[name="supabase-key"]')
          ? document.querySelector('meta[name="supabase-key"]').content
          : "",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/umd/supabase.min.js" onerror="console.error('Failed to load Supabase SDK')"></script>
  </head>

  <body>
    <!-- Content -->

    <div class="container-xxl">
      <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
          <!-- Login -->
          <div class="card px-sm-6 px-0">
            <div class="card-body">
              <h4 class="mb-1">Welcome back!</h4>
              <p class="mb-6">Please sign-in to your account to continue</p>
              <div id="loginAlerts"></div>
              <form
                id="formAuthentication"
                class="mb-6"
                action="#"
                method="POST"
              >
                <div class="mb-6 form-control-validation">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="text"
                    class="form-control"
                    id="email"
                    name="email"
                    value=""
                    placeholder="Enter your email!"
                  />
                </div>
                <div class="mb-6 form-password-toggle form-control-validation">
                  <label class="form-label" for="password">Password</label>
                  <div class="input-group input-group-merge">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      name="password"
                      placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                      aria-describedby="password"
                    />
                    <span class="input-group-text cursor-pointer">
                      <i class="icon-base bx bx-hide"></i>
                    </span>
                  </div>
                </div>
                <div class="mb-7">
                  <div class="d-flex justify-content-between">
                    <div class="form-check mb-0">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="remember-me"
                        name="remember"
                      />
                      <label class="form-check-label" for="remember-me">
                        Remember Me
                      </label>
                    </div>
                    <a href="auth-forgot-password-basic.html">
                      <span>Forgot Password?</span>
                    </a>
                  </div>
                </div>
                <div class="mb-6">
                  <button class="btn btn-primary d-grid w-100" type="submit">
                    Login
                  </button>
                </div>
              </form>
            </div>
          </div>
          <!-- /Login -->
        </div>
      </div>
    </div>

    <!-- / Content -->

    <!-- Core JS -->
    <!-- build:js assets/vendor/js/theme.js  -->

    <script src="./assets/vendor/libs/jquery/jquery.js"></script>

    <script src="./assets/vendor/libs/popper/popper.js"></script>
    <script src="./assets/vendor/js/bootstrap.js"></script>
    <script src="./assets/vendor/libs/@algolia/autocomplete-js.js"></script>

    <script src="./assets/vendor/libs/pickr/pickr.js"></script>

    <script src="./assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>

    <script src="./assets/vendor/libs/hammer/hammer.js"></script>

    <script src="./assets/vendor/libs/i18n/i18n.js"></script>

    <script src="./assets/vendor/js/menu.js"></script>

    <!-- endbuild -->

    <!-- Vendors JS -->
    <script src="./assets/vendor/libs/@form-validation/popular.js"></script>
    <script src="./assets/vendor/libs/@form-validation/bootstrap5.js"></script>
    <script src="./assets/vendor/libs/@form-validation/auto-focus.js"></script>

    <!-- Main JS -->

    <script src="./assets/js/main.js"></script>

    <!-- Page JS -->
    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const form = document.getElementById("formAuthentication");
        const alerts = document.getElementById("loginAlerts");

        function showAlert(type, message) {
          if (!alerts) return;
          const div = document.createElement("div");
          div.className = `alert alert-${type} alert-dismissible fade show`;
          div.role = "alert";
          div.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>`;
          alerts.appendChild(div);
        }

        async function getSupabaseClient() {
          if (window.__supabase_client) return window.__supabase_client;
          const cfg = window.__SUPABASE_CONFIG || {};
          // If SDK already loaded
          if (window.supabase && typeof window.supabase.createClient === 'function') {
            window.__supabase_client = window.supabase.createClient(cfg.url, cfg.key);
            return window.__supabase_client;
          }
          // Otherwise, try to dynamically load SDK
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/umd/supabase.min.js';
            s.onload = resolve;
            s.onerror = () => reject(new Error('Failed to load Supabase SDK'));
            document.head.appendChild(s);
          });
          if (window.supabase && typeof window.supabase.createClient === 'function') {
            window.__supabase_client = window.supabase.createClient(cfg.url, cfg.key);
            return window.__supabase_client;
          }
          throw new Error('Supabase SDK not available');
        }

        // Auth Guard: If already logged in, redirect to index
        try {
          const supa = await getSupabaseClient();
          const { data: { session } } = await supa.auth.getSession();
          if (session) {
            window.location.href = "./index.html";
            return;
          }
        } catch (err) {
          console.error("Auth guard check failed", err);
        }

        if (!form) return;

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password) {
            showAlert("warning", "Email and password are required.");
            return;
          }

          const submitBtn = form.querySelector('button[type="submit"]');
          if (submitBtn) submitBtn.disabled = true;

          try {
            const supa = await getSupabaseClient();
            const { data, error } = await supa.auth.signInWithPassword({
              email,
              password,
            });
            if (error) throw error;
            showAlert("success", "Signed in successfully. Redirecting...");
            setTimeout(() => {
              window.location.href = "./index.html";
            }, 800);
          } catch (err) {
            console.error("Login error", err);
            showAlert("danger", err.message || JSON.stringify(err));
          } finally {
            if (submitBtn) submitBtn.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
